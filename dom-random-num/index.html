<!doctype html>
<html lang="en">
	<head>
		<title>Random Number Generator</title>
		<link href="styles.css" type="text/css" rel="stylesheet" />
		<script src="script.js" defer></script>
	</head>
	<body>
		<div id="page-container">
			<header>
				<h1>Random Number Generator</h1>
			</header>

			<main>
				<section id="date-section" class="outlined-box">
					<p id="date-output">Today's date is</p>
				</section>

				<section id="random-num-section">
					<h2>Want a random number?</h2>
					<button id="num-button">Click me!</button>
					<div id="num-box" class="outlined-box">
						<span id="num-output">0</span>
					</div>
				</section>
			</main>
		</div>
	</body>
</html>
